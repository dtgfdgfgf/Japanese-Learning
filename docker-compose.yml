# T102: Create docker-compose.yml for local development
# DoD: `docker-compose up` 啟動 app + postgres；可本地測試完整流程

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: japanese-learning-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/japanese_learning
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
      - LINE_CHANNEL_ACCESS_TOKEN=${LINE_CHANNEL_ACCESS_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - USER_ID_SALT=${USER_ID_SALT:?USER_ID_SALT must be set - see .env.example}
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro  # Mount source for development
    restart: unless-stopped
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    container_name: japanese-learning-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=japanese_learning
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d japanese_learning"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  # Optional: Adminer for database management UI
  adminer:
    image: adminer
    container_name: japanese-learning-adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - app-network
    profiles:
      - tools  # Only start with: docker-compose --profile tools up

volumes:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge

# Usage:
# 1. Copy .env.example to .env and fill in values
# 2. docker-compose up -d
# 3. docker-compose exec app alembic upgrade head
# 4. Open http://localhost:8000/health
# 5. Use ngrok for LINE webhook testing: ngrok http 8000
